<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Hash - Astro Chart</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a12;
            color: #e8e8f0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #d4af37;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #8888a0;
        }
        input, button {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            background: rgba(20, 20, 35, 0.8);
            color: #e8e8f0;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #d4af37;
        }
        button {
            background: linear-gradient(135deg, #d4af37, #b29126);
            color: #0a0a12;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover {
            opacity: 0.9;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(20, 20, 35, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
        }
        .result h3 {
            color: #d4af37;
            margin-bottom: 15px;
        }
        .result-url {
            word-break: break-all;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 14px;
        }
        .result-url a {
            color: #7a9cbf;
        }
        .copy-btn {
            width: auto;
            padding: 10px 20px;
            font-size: 14px;
        }
        .coords {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .geocode-btn {
            margin-top: 10px;
            background: rgba(122, 156, 191, 0.2);
            border-color: rgba(122, 156, 191, 0.4);
            color: #7a9cbf;
        }
        .status {
            font-size: 14px;
            color: #8888a0;
            margin-top: 10px;
        }
        .status.success { color: #10B981; }
        .status.error { color: #EF4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Generador de Hash</h1>
        
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="name" placeholder="Carlos">
        </div>
        
        <div class="form-group">
            <label>Fecha de nacimiento (YYYY-MM-DD)</label>
            <input type="date" id="date">
        </div>
        
        <div class="form-group">
            <label>Hora de nacimiento</label>
            <input type="time" id="time" value="12:00">
        </div>
        
        <div class="form-group">
            <label>Ciudad</label>
            <input type="text" id="city" placeholder="Santiago, Chile">
            <button class="geocode-btn" onclick="geocode()">📍 Obtener coordenadas</button>
            <div id="geocode-status" class="status"></div>
        </div>
        
        <div class="form-group coords">
            <div>
                <label>Latitud</label>
                <input type="text" id="lat" placeholder="-33.4489">
            </div>
            <div>
                <label>Longitud</label>
                <input type="text" id="lon" placeholder="-70.6693">
            </div>
        </div>
        
        <button onclick="generate()">Generar Hash</button>
        
        <div id="result" class="result" style="display: none;">
            <h3>URL generada:</h3>
            <div class="result-url">
                <a id="result-link" href="#" target="_blank"></a>
            </div>
            <button class="copy-btn" onclick="copyURL()">📋 Copiar URL</button>
            <div id="copy-status" class="status"></div>
        </div>
    </div>
    
    <script>
        async function geocode() {
            const city = document.getElementById('city').value;
            const status = document.getElementById('geocode-status');
            
            if (!city) {
                status.textContent = 'Ingresa una ciudad';
                status.className = 'status error';
                return;
            }
            
            status.textContent = 'Buscando...';
            status.className = 'status';
            
            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`
                );
                const data = await response.json();
                
                if (data.length > 0) {
                    document.getElementById('lat').value = parseFloat(data[0].lat).toFixed(4);
                    document.getElementById('lon').value = parseFloat(data[0].lon).toFixed(4);
                    status.textContent = `✓ Encontrado: ${data[0].display_name}`;
                    status.className = 'status success';
                } else {
                    status.textContent = 'Ciudad no encontrada';
                    status.className = 'status error';
                }
            } catch (e) {
                status.textContent = 'Error de conexión';
                status.className = 'status error';
            }
        }
        
        function generate() {
            const data = {
                n: document.getElementById('name').value,
                d: document.getElementById('date').value.replace(/-/g, ''),
                t: document.getElementById('time').value,
                c: document.getElementById('city').value,
                lat: document.getElementById('lat').value,
                lon: document.getElementById('lon').value
            };
            
            const jsonStr = JSON.stringify(data);
            const base64 = btoa(unescape(encodeURIComponent(jsonStr)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
            
            const url = `https://chuchurex.cl/#${base64}`;
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-link').href = url;
            document.getElementById('result-link').textContent = url;
        }
        
        async function copyURL() {
            const url = document.getElementById('result-link').href;
            const status = document.getElementById('copy-status');
            
            try {
                await navigator.clipboard.writeText(url);
                status.textContent = '✓ Copiado!';
                status.className = 'status success';
            } catch (e) {
                prompt('Copia esta URL:', url);
            }
        }
    </script>
</body>
</html>
